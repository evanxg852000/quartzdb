# Random Syslog-formatted logs
[sources.dummy_logs]
type = "demo_logs"
format = "syslog"
interval = 0.01

[transforms.modify_logs]
type = "remap"
inputs = ["dummy_logs"]
source = '''
. |= parse_syslog!(string!(.message))
'''

[sinks.file_output]
type = "file"
inputs = ["modify_logs"]
path = "./server-logs.ndjson"
encoding.codec = "json"
